name: Release Windows App

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AUTO_UPDATE_PROVIDER: github
      AUTO_UPDATE_GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare GitHub release version
        run: npm run prepare:release-version

      - name: Prepare bundled config
        run: npm run prepare:bundle

      - name: Build application
        run: npm run build

      - name: Publish Windows release to GitHub Releases
        run: npm run package:github-release
